name: Update Weather GeoJSON

on:
  schedule:
    # รันทุกๆ 3 ชั่วโมง
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and Save Weather GeoJSON
        shell: python
        run: |
          import requests
          import xml.etree.ElementTree as ET
          import json

          # URL กรมอุตุฯ
          url = "https://data.tmd.go.th/api/WeatherForecast7DaysByRegion/v2/?uid=demo&ukey=demokey"
          
          try:
              response = requests.get(url, timeout=30)
              response.raise_for_status()
              root = ET.fromstring(response.content)

              # โครงสร้าง GeoJSON มาตรฐาน
              geojson = {
                  "type": "FeatureCollection",
                  "features": []
              }

              for region in root.findall('.//RegionForecast'):
                  feature = {
                      "type": "Feature",
                      "geometry": None, # ArcGIS จะดึงแค่ตารางข้อมูลถ้าไม่มี geometry
                      "properties": {
                          "region_thai": region.find('RegionNameThai').text.strip(),
                          "description_thai": region.find('DescriptionThai').text.strip(),
                          "region_eng": region.find('RegionNameEnglish').text.strip()
                      }
                  }
                  geojson["features"].append(feature)

              # บันทึกไฟล์ชื่อ weather.geojson
              with open("weather.geojson", "w", encoding="utf-8") as f:
                  json.dump(geojson, f, ensure_ascii=False, indent=4)
              
              print("Successfully updated weather.geojson")
          except Exception as e:
              print(f"Error: {e}")
              exit(1)

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [[ -n $(git status -s) ]]; then
            git add weather.geojson
            git commit -m "Auto-update weather geojson: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit"
          fi
